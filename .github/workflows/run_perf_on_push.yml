name: Trigger Performance Test on Push

on:
  push:
    branches:
      - main  # This ensures it runs whenever a push happens to the 'main' branch

jobs:
  call-perf-test:
    # This tells GitHub to use the performance testing workflow you already have
    uses: ./.github/workflows/performance_testing.yml@main 
    with:
      [cite_start]project_name: 'pt55' # Replace with your actual project name [cite: 32]
      [cite_start]test_type: 'linear'             # You can change this to 'ramp' or 'spike' [cite: 33]
      [cite_start]users: 2                    # Number of users to simulate [cite: 34]
      [cite_start]duration: 120                   # Duration in seconds [cite: 35]
    secrets:
      # These must match the secrets required by your main script [cite: 127]
      PERF_API_URL: ${{ secrets.PERF_API_URL }}
      PERF_USERNAME: ${{ secrets.PERF_USERNAME }}
      PERF_PASSWORD: ${{ secrets.PERF_PASSWORD }}
