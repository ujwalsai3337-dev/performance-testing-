name: Trigger Performance Test on Push

on:
  push:
    branches:
      - main  # Runs whenever code is pushed to the main branch

jobs:
  call-performance-test:
    # Points to your existing performance testing workflow file
    uses: ./.github/workflows/main.yml
    with:
      project_name: 'pt55'      # Project name from your manual run
      test_type: 'linear'       # Test profile type
      users: '2'                # Number of users (must be a string in quotes)
      duration: '120'           # Test duration (must be a string in quotes)
    secrets:
      # Secrets passed to the main workflow for API access
      PERF_API_URL: ${{ secrets.PERF_API_URL }}
      PERF_USERNAME: ${{ secrets.PERF_USERNAME }}
      PERF_PASSWORD: ${{ secrets.PERF_PASSWORD }}
