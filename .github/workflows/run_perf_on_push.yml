name: Trigger Performance Test on Push

on:
  push:
    branches:
      - main  # Runs whenever code is pushed to the main branch

jobs:
  call-performance-test:
    # Points to your existing performance testing workflow file
    # Ensure the filename matches exactly: performance_testing.yml
    uses: ./.github/workflows/performance_testing.yml@main
    with:
      [cite_start]project_name: 'pt55'      # Project name from your documentation [cite: 32]
      [cite_start]test_type: 'linear'       # Valid options: linear, constant, ramp, spike, custom [cite: 7, 33]
      [cite_start]users: '2'                # Passed as string to match workflow input type [cite: 34, 125]
      [cite_start]duration: '120'           # Passed as string to match workflow input type [cite: 35, 120]
    secrets:
      # These secrets must be defined in your GitHub Repository Settings [cite: 9, 36]
      PERF_API_URL: ${{ secrets.PERF_API_URL }}
      PERF_USERNAME: ${{ secrets.PERF_USERNAME }}
      PERF_PASSWORD: ${{ secrets.PERF_PASSWORD }}
